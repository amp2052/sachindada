{% extends "app/base.html" %}
{% load static %}

{% block title %}Gallery - Sanjay Rathod{% endblock %}

{% block content %}
<section class="py-5 bg-light">
  <div class="container">
    <h2 class="text-center fw-bold mb-5" style="color: #b95a06;">Stock Images / Gallery</h2>
    <div class="row g-4">

      <!-- Image 1 -->
      <div class="col-md-3 col-sm-6">
        <div class="card shadow-sm">
          <img src="{% static 'app/images/gallery1.jpg' %}" class="card-img-top img-fluid rounded" alt="Gallery Image 1">
        </div>
      </div>

      <!-- Image 2 -->
      <div class="col-md-3 col-sm-6">
        <div class="card shadow-sm">
          <img src="{% static 'app/images/gallery2.jpg' %}" class="card-img-top img-fluid rounded" alt="Gallery Image 2">
        </div>
      </div>

      <!-- Image 3 -->
      <div class="col-md-3 col-sm-6">
        <div class="card shadow-sm">
          <img src="{% static 'app/images/gallery3.jpg' %}" class="card-img-top img-fluid rounded" alt="Gallery Image 3">
        </div>
      </div>

      <!-- Image 4 -->
      <div class="col-md-3 col-sm-6">
        <div class="card shadow-sm">
          <img src="{% static 'app/images/gallery4.jpg' %}" class="card-img-top img-fluid rounded" alt="Gallery Image 4">
        </div>
      </div>

      <!-- Image 5 -->
      <div class="col-md-3 col-sm-6">
        <div class="card shadow-sm">
          <img src="{% static 'app/images/gallery5.jpg' %}" class="card-img-top img-fluid rounded" alt="Gallery Image 5">
        </div>
      </div>

      <!-- Image 6 -->
      <div class="col-md-3 col-sm-6">
        <div class="card shadow-sm">
          <img src="{% static 'app/images/gallery6.jpg' %}" class="card-img-top img-fluid rounded" alt="Gallery Image 6">
        </div>
      </div>

      <!-- Image 7 -->
      <div class="col-md-3 col-sm-6">
        <div class="card shadow-sm">
          <img src="{% static 'app/images/gallery7.jpg' %}" class="card-img-top img-fluid rounded" alt="Gallery Image 7">
        </div>
      </div>

      <!-- Image 8 -->
      <div class="col-md-3 col-sm-6">
        <div class="card shadow-sm">
          <img src="{% static 'app/images/gallery8.jpg' %}" class="card-img-top img-fluid rounded" alt="Gallery Image 8">
        </div>
      </div>

    </div>

    <!-- View All Button -->
    <div class="text-center mt-5">
      <a href="{% url 'stock' %}" class="btn btn-outline-dark btn-lg">View All Images</a>
    </div>
  </div>
</section>
{% endblock %}
