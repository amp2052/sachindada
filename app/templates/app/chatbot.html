{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Chat container */
        #chat-container {
            width: 100%;
            max-width: 600px;
            margin: 50px auto;
        }

        #chatbox {
            height: 400px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            background: #f9f9f9;
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user {
            background-color: #cce5ff;
            text-align: right;
            margin-left: auto;
        }

        .bot {
            background-color: #d4edda;
            text-align: left;
            margin-right: auto;
        }

        /* Input group */
        #input-group {
            margin-top: 15px;
        }

        #user_input {
            width: 80%;
        }

        #send_btn {
            width: 20%;
        }

        /* Optional: make chatbox scroll to bottom */
        #chatbox::-webkit-scrollbar {
            width: 6px;
        }

        #chatbox::-webkit-scrollbar-thumb {
            background-color: #888;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div id="chat-container">
    <h2 class="text-center">AI Chatbot</h2>
    <div id="chatbox"></div>
    <div class="input-group" id="input-group">
        <input type="text" id="user_input" class="form-control" placeholder="Type your message...">
        <button id="send_btn" class="btn btn-primary">Send</button>
    </div>
</div>

<script>
    const chatbox = document.getElementById("chatbox");
    const input = document.getElementById("user_input");
    const sendBtn = document.getElementById("send_btn");

    function appendMessage(message, sender) {
        const div = document.createElement("div");
        div.classList.add("message", sender);
        div.innerHTML = message;
        chatbox.appendChild(div);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    sendBtn.onclick = async () => {
        const message = input.value.trim();
        if (!message) return;
        appendMessage(`<b>You:</b> ${message}`, "user");
        input.value = "";

        try {
            const response = await fetch("{% url 'chatbot' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": "{{ csrf_token }}",
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: "message=" + encodeURIComponent(message)
            });

            const data = await response.json();
            if (data.message) {
                appendMessage(`<b>Bot:</b> ${data.message}`, "bot");
            } else if (data.error) {
                appendMessage(`<b>Bot Error:</b> ${data.error}`, "bot");
            }
        } catch (err) {
            appendMessage(`<b>Bot Error:</b> ${err}`, "bot");
        }
    };

    // Optional: Send message on Enter key
    input.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            sendBtn.click();
        }
    });
</script>
</body>
</html>
