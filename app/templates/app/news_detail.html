{% extends "app/base.html" %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}

<section class="py-5">

<div class="container">

<h1 class="fw-bold mb-3">{{ article.title }}</h1>

<p class="text-muted">
📍 {{ article.location }} | {{ article.date }}
</p>

<img src="{{ article.image.url }}" class="img-fluid rounded shadow mb-4">


<div class="fs-5" style="line-height:1.8;">
{{ article.content|linebreaks }}
</div>


<hr>

<h5>Share This News</h5>

<a class="btn btn-primary btn-sm"
href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}">
Facebook
</a>

<a class="btn btn-success btn-sm"
href="https://api.whatsapp.com/send?text={{ request.build_absolute_uri }}">
WhatsApp
</a>

<a class="btn btn-info btn-sm"
href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri }}">
Twitter
</a>


<div class="mt-4">

<a href="{% url 'news' %}" class="btn btn-outline-dark">
← Back to News
</a>

</div>

</div>

</section>

{% endblock %}
